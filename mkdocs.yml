site_name: ReservoirPy
site_description: Lightweight modular reservoir simulator
site_author: Zhenglong Chen
repo_url: https://github.com/yourusername/reservoirpy
repo_name: reservoirpy

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: 深色模式
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: 浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - gen-files:
      scripts:
        - docs/scripts/gen_ref_nav.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_object_full_path: false
            show_category_heading: true
            members_order: source
            heading_level: 2
            inherited_members: true
            docstring_section_style: table
            merge_init_into_class: true

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md
  - 快速开始: getting-started.md
  - 理论基础:
    - theory/index.md
    - 有限体积法: theory/fvm.md
    - 单相流方程: theory/single-phase.md
    - 单相流求解全流程: theory/single-phase-walkthrough.md
    - 两相流方程: theory/two-phase.md
    - IMPES方法: theory/impes.md
    - 井模型: theory/well-model.md
  - API 参考: reference/
  - 示例:
    - examples/index.md
    - 单相流模拟: examples/single-phase.md
    - 两相流水驱模拟: examples/two-phase-waterflood.md
